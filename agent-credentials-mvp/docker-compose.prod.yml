version: "3.8"

# Production Docker Compose Override
# Usage: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# This override assumes PostgreSQL is provided by AWS RDS or another managed service.

services:
  redis:
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  backend:
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      DB_SSL_MODE: ${DB_SSL_MODE:-require}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-20}
      DB_CONNECTION_TIMEOUT_MS: ${DB_CONNECTION_TIMEOUT_MS:-10000}
      DB_IDLE_TIMEOUT_MS: ${DB_IDLE_TIMEOUT_MS:-30000}
      DB_STATEMENT_TIMEOUT_MS: ${DB_STATEMENT_TIMEOUT_MS:-60000}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      CORS_ORIGIN: ${CORS_ORIGIN}
      PORT: 3001
      LOG_LEVEL: warn
      ENABLE_EVENT_SYNC: ${ENABLE_EVENT_SYNC:-true}
      ENABLE_PROOF_QUEUE: ${ENABLE_PROOF_QUEUE:-true}
    restart: always
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          memory: 256M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  frontend:
    environment:
      NODE_ENV: production
      AGENT_CREDENTIALS_API_URL: ${AGENT_CREDENTIALS_API_URL:-http://backend:3001}
      NEXT_PUBLIC_AGENT_CREDENTIALS_API_URL: ${NEXT_PUBLIC_AGENT_CREDENTIALS_API_URL}
    restart: always
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          memory: 256M
